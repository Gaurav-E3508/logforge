

services:

  # ZooKeeper — required by Kafka for coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: logforge-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka — the central message bus
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logforge-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_RETENTION_HOURS: 168   # keep logs for 7 days

  # Redis — hot storage tier (last 1 hour of logs)
  redis:
    image: redis:7.2-alpine
    container_name: logforge-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes  # enable persistence

  # MongoDB — warm storage tier (last 30 days)
  mongodb:
    image: mongo:7.0
    container_name: logforge-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: logforge
      MONGO_INITDB_ROOT_PASSWORD: logforge123
      MONGO_INITDB_DATABASE: logforge
    volumes:
      - mongodb_data:/data/db   # data survives container restarts

  # Kafka UI — web dashboard to inspect topics/messages (very helpful!)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logforge-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: logforge-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes:
  mongodb_data:
spring.application.name=index-engine
server.port=8083

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=index-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.logforge.common.model

spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=logforge
spring.data.mongodb.username=logforge
spring.data.mongodb.password=logforge123
spring.data.mongodb.authentication-database=admin

# Max terms in hot JVM index before flushing to MongoDB
logforge.index.hot-index-max-terms=50000

# Max posting list size before compressing older entries to MongoDB
logforge.index.max-postings-per-term=10000
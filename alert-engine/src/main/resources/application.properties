spring.application.name=alert-engine
server.port=8085

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=alert-engine-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.logforge.common.model

# EWMA smoothing factor (0-1). Lower = smoother, slower to react.
# 0.3 means: 30% weight to new value, 70% weight to historical average
logforge.alert.ewma-alpha=0.3

# How many consecutive threshold breaches before PENDING ? FIRING
logforge.alert.pending-threshold=3

# How many consecutive normal readings before FIRING ? RESOLVED
logforge.alert.resolve-threshold=5

# Default error rate threshold to trigger alerts (%)
logforge.alert.default-error-rate-threshold=30

# Evaluation interval (ms) - how often EWMA is recalculated
logforge.alert.evaluation-interval-ms=60000
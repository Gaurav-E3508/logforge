spring.application.name=ingestion-service
server.port=8081

# Kafka consumer config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ingestion-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.logforge.common.model

# Redis config
spring.data.redis.host=localhost
spring.data.redis.port=6379

# MongoDB config
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=logforge
spring.data.mongodb.username=logforge
spring.data.mongodb.password=logforge123
spring.data.mongodb.authentication-database=admin

# How many threads consume from Kafka in parallel
logforge.ingestion.concurrency=12

# Bloom filter config
logforge.ingestion.bloom-filter-capacity=1000000
logforge.ingestion.bloom-filter-error-rate=0.01

# Redis TTL for hot storage (1 hour)
logforge.ingestion.hot-ttl-seconds=3600
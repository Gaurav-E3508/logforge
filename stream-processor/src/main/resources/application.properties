spring.application.name=stream-processor
server.port=8082

spring.kafka.bootstrap-servers=localhost:9092
logforge.zookeeper.connect-string=localhost:2181
spring.kafka.consumer.group-id=stream-processor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.logforge.common.model

# Window config
logforge.stream.window-size-minutes=5
logforge.stream.eviction-interval-ms=60000

# Pattern detection thresholds
logforge.stream.error-spike-threshold=10
logforge.stream.error-rate-threshold-percent=50